services:

  hardhat:
    build:
      context: ./contracts
    container_name: hardhat
    ports:
      - "8545:8545"   # expose RPC for optional external tools (Metamask, etc.)
    volumes:
      - shared:/shared
    environment:
      EXTRA_ADDRESSES: "0x5aadca1184f19f37462c44ae222eeae3cd08bed1,0xcA904E7d9b87b3d13F9A0600180C6d1aB8fae7b3,0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
    healthcheck:
      # Ready once contracts.env has been written by the deploy script
      test: ["CMD", "test", "-f", "/shared/contracts.env"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      - shared:/shared
    depends_on:
      hardhat:
        condition: service_healthy
    environment:
      # Override the private key here if needed (default = Hardhat account #0)
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  shared:
